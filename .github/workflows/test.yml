name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  unit:
    name: Lint, typecheck, test, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - run: bun test
      - run: bun run build
      - name: Fail if dist/ is dirty
        run: |
          if [[ -n "$(git status --porcelain dist/)" ]]; then
            echo "::error::dist/ is out of sync. Run 'bun run build' and commit the result."
            git --no-pager diff dist/ | head -200
            exit 1
          fi

  node-compat:
    name: Node ${{ matrix.node-version }} bundle compatibility
    needs: unit
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [22, 24, 26]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}
      - name: Run bundle against valid fixtures (expect exit 0)
        run: |
          out=$(mktemp)
          summary=$(mktemp)
          env \
            "INPUT_FILES=**/*.md" \
            "INPUT_WORKING-DIRECTORY=tests/fixtures/valid" \
            "INPUT_FAIL-ON-WARNING=false" \
            "INPUT_COMMENT-ON-PR=false" \
            "INPUT_GITHUB-TOKEN=" \
            GITHUB_OUTPUT="$out" \
            GITHUB_STEP_SUMMARY="$summary" \
            node dist/index.js
      - name: Run bundle against invalid fixtures (expect non-zero)
        run: |
          out=$(mktemp)
          summary=$(mktemp)
          set +e
          env \
            "INPUT_FILES=**/*.md" \
            "INPUT_WORKING-DIRECTORY=tests/fixtures/invalid" \
            "INPUT_FAIL-ON-WARNING=false" \
            "INPUT_COMMENT-ON-PR=false" \
            "INPUT_GITHUB-TOKEN=" \
            GITHUB_OUTPUT="$out" \
            GITHUB_STEP_SUMMARY="$summary" \
            node dist/index.js
          code=$?
          set -e
          if [ "$code" -eq 0 ]; then
            echo "::error::Expected non-zero exit on invalid fixtures, got 0"
            exit 1
          fi

  e2e-valid:
    name: E2E — valid fixtures pass
    runs-on: ubuntu-latest
    needs: unit
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./
        id: validate
        with:
          files: '**/*.md'
          working-directory: tests/fixtures/valid
          comment-on-pr: 'false'
      - name: Assert outputs
        run: |
          test "${{ steps.validate.outputs.error-count }}" = "0"
          test "${{ steps.validate.outputs.warning-count }}" = "0"
          test "${{ steps.validate.outputs.file-count }}" -gt "0"
          test "${{ steps.validate.outputs.block-count }}" -gt "0"

  e2e-invalid:
    name: E2E — invalid fixtures fail
    runs-on: ubuntu-latest
    needs: unit
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./
        id: validate
        continue-on-error: true
        with:
          files: '**/*.md'
          working-directory: tests/fixtures/invalid
          comment-on-pr: 'false'
      - name: Assert action failed and reported errors
        run: |
          test "${{ steps.validate.outcome }}" = "failure"
          test "${{ steps.validate.outputs.error-count }}" -gt "0"
